name: Actualización trimestral de datos y despliegue

# Cadencia trimestral, no semanal: la mayoría de las series fuente (ITAEE,
# EMIM, PIBE, BEA GDP estatal, BLS) se publican mensual o trimestralmente,
# con rezagos de 30-120 días. Corremos a mediados de enero/abril/julio/octubre
# para capturar la publicación del trimestre anterior con margen de rezago.
# `workflow_dispatch` permite correr manualmente si una fuente publica fuera
# de este calendario.
on:
  schedule:
    - cron: "0 13 15 1,4,7,10 *"
  workflow_dispatch: {}

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: update-and-deploy
  cancel-in-progress: false

jobs:
  pipeline:
    name: Pipeline de datos (ingesta + motor econométrico)
    runs-on: ubuntu-latest
    outputs:
      data_changed: ${{ steps.diff.outputs.changed }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: pipeline/requirements.txt

      - name: Instalar dependencias del pipeline
        run: pip install -r pipeline/requirements.txt

      - name: Correr pruebas unitarias del motor econométrico
        run: python -m pytest pipeline/tests/ -v

      - name: Ejecutar pipeline
        env:
          INEGI_TOKEN: ${{ secrets.INEGI_TOKEN }}
          BANXICO_TOKEN: ${{ secrets.BANXICO_TOKEN }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          BEA_API_KEY: ${{ secrets.BEA_API_KEY }}
          BLS_API_KEY: ${{ secrets.BLS_API_KEY }}
        run: |
          # TODO: cuando exista un orquestador de ingesta real (pipeline/ingestion/*
          # ya tiene los clientes por fuente, pero falta el script que los conecte
          # end-to-end con pipeline_runner.run_pair), esta línea debe elegir entre
          # modo live y mock según si las credenciales están presentes. Por ahora
          # siempre corre en modo mock — ver docs/arquitectura.md.
          if [ -z "$INEGI_TOKEN" ]; then
            echo "Sin credenciales configuradas todavía — corriendo en modo mock." | tee -a "$GITHUB_STEP_SUMMARY"
          fi
          python -m pipeline.mock.generate_mock_data

      - name: Detectar cambios en /data
        id: diff
        run: |
          if git diff --quiet -- data/; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit de datos actualizados
        if: steps.diff.outputs.changed == 'true'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "data: actualización trimestral $(date -u +%Y-%m-%d)"
          file_pattern: "data/**"
          commit_user_name: "atlas-bot"
          commit_user_email: "actions@users.noreply.github.com"

  build-and-deploy:
    name: Build estático y despliegue
    needs: pipeline
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: app/package-lock.json

      - name: Instalar dependencias
        working-directory: app
        run: npm ci --legacy-peer-deps

      - name: Sincronizar datos y construir sitio estático
        working-directory: app
        run: npm run build

      - name: Desplegar a Vercel (deploy hook)
        if: ${{ vars.VERCEL_DEPLOY_HOOK_URL != '' }}
        run: curl -X POST "${{ vars.VERCEL_DEPLOY_HOOK_URL }}"

      - name: Sin deploy hook configurado
        if: ${{ vars.VERCEL_DEPLOY_HOOK_URL == '' }}
        run: |
          echo "No hay VERCEL_DEPLOY_HOOK_URL configurado en las variables del repo — build verificado pero sin desplegar. Ver README para conectar Vercel." >> "$GITHUB_STEP_SUMMARY"
