# Corredores/clústeres industriales tomados como referencia del Atlas 2021.
# Fase 3 los trata como agregados tabulares por grupo de estados (no mapa
# municipal todavía).
corridors:
  - id: aeroespacial-noreste
    label: "Corredor aeroespacial del noreste"
    sector_id: aeroespacial
    mx_state_codes: ["08", "22", "02", "05", "19"]   # Chihuahua, Querétaro, BC, Coahuila, NL

  - id: farmaceutico-laguna-culiacan
    label: "Corredor farmacéutico La Laguna–Culiacán"
    sector_id: farmaceutica
    mx_state_codes: ["05", "10", "25", "14"]          # Coahuila, Durango, Sinaloa, Jalisco

  - id: agroindustrial-sureste
    label: "Corredor agroindustrial Coatzacoalcos–Villahermosa–Palenque"
    sector_id: agroindustrial
    mx_state_codes: ["30", "27", "07"]                # Veracruz, Tabasco, Chiapas

  - id: petroquimico-tamaulipas
    label: "Polo petroquímico de Tamaulipas"
    sector_id: petroquimica
    mx_state_codes: ["28", "05"]                      # Tamaulipas, Coahuila (Nava)

  - id: siderurgico-metalico
    label: "Complejos siderúrgicos y metal-mecánicos"
    sector_id: manufactura_total
    mx_state_codes: ["19", "24", "21", "15", "11", "14"]  # NL, SLP, Puebla, Edomex, Guanajuato, Jalisco
